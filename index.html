<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Raj Agencies | Official Logo</title>
  <meta name="description" content="Raj Agencies ka official logo aur basic company details." />

  <meta property="og:title" content="Raj Agencies | Official Logo" />
  <meta property="og:description" content="Raj Agencies ka official logo dekhne ke liye click karein." />
  <meta property="og:image" content="https://yourdomain.com/logo.jpg" />
  <meta property="og:url" content="https://yourdomain.com/" />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      width: 360px;
      max-width: 90%;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      text-align: center;
      padding: 30px 20px;
    }

    .logo {
      width: 140px;
      height: 140px;
      object-fit: contain;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      color: #1a1a1a;
    }

    p {
      margin: 0;
      color: #555;
      font-size: 15px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo.jpg" alt="Raj Agencies Logo" class="logo" />
    <h1>Raj Agencies</h1>
    <p>Yeh Raj Agencies ka official logo hai.</p>
  </div>
</body>
</html>
